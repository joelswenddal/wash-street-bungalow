<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Washington Street Bungalow — Guest Guide QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --cream:   #f8f5f0;
      --warm:    #ede8df;
      --sand:    #c9b99a;
      --brown:   #7a6652;
      --accent:  #8b6f4e;
      --ink:     #1a1714;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      font-family: var(--font-body);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: white;
      border: 1px solid var(--warm);
      border-radius: 4px;
      width: 3in;
      height: 5in;
      padding: 0.3in 0.32in;
      text-align: center;
      box-shadow: 0 4px 40px rgba(122,102,82,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    .eyebrow {
      font-size: 0.55rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sand);
    }

    .property-name {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--ink);
      line-height: 1.1;
      margin-top: 0.15rem;
    }

    .property-name em {
      font-style: italic;
      color: var(--accent);
    }

    .horiz-divider {
      width: 32px;
      height: 1px;
      background: var(--sand);
      flex-shrink: 0;
    }

    #qrcode {
      padding: 0.5rem;
      border: 1px solid var(--warm);
      border-radius: 4px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #qrcode canvas,
    #qrcode img { display: block; }

    .cta {
      font-family: var(--font-display);
      font-size: 0.82rem;
      font-weight: 300;
      font-style: italic;
      color: var(--brown);
      line-height: 1.4;
    }

    .url {
      font-size: 0.55rem;
      letter-spacing: 0.05em;
      color: var(--sand);
    }

    /* WiFi — clean, no inner boxes */
    .wifi-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .wifi-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
    }

    .wifi-label {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--sand);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .wifi-dots {
      flex: 1;
      border-bottom: 1px dotted var(--warm);
      margin-bottom: 0.15rem;
    }

    .wifi-value {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.2;
      text-align: right;
    }

    @media print {
      @page {
        size: 3in 5in;
        margin: 0;
      }
      body {
        background: white;
        padding: 0;
        min-height: unset;
      }
      .card {
        box-shadow: none;
        border: 1px solid #ddd;
        width: 3in;
        height: 5in;
        border-radius: 0;
      }
      .no-print { display: none; }
    }
  </style>
</head>
<body>

  <div>
    <div class="card">
      <span class="eyebrow">Welcome, guests</span>

      <h1 class="property-name">The Washington Street<br/><em>Bungalow</em></h1>

      <div class="horiz-divider"></div>

      <div id="qrcode"></div>

      <p class="cta">Scan for unit info, dining,<br/>nightlife &amp; recommendations</p>

      <!--span class="url">joelswenddal.github.io/wash-street-bungalow</span-->

      <div class="horiz-divider"></div>

      <div class="wifi-block">
        <div class="wifi-row">
          <span class="wifi-label">📶 Wifi Network</span>
          <span class="wifi-dots"></span>
          <span class="wifi-value">WashStBungalow</span>
        </div>
        <div class="wifi-row">
          <span class="wifi-label">🔑 Password</span>
          <span class="wifi-dots"></span>
          <span class="wifi-value">urbana.1951!</span>
        </div>
      </div>
    </div>

    <div class="no-print" style="text-align:center; margin-top:1.5rem;">
      <button onclick="window.print()" style="
        font-family: 'DM Sans', sans-serif;
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        background: #8b6f4e;
        color: white;
        border: none;
        padding: 0.7rem 2rem;
        border-radius: 2px;
        cursor: pointer;
      ">Print / Save as PDF</button>
    </div>
  </div>

  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://joelswenddal.github.io/wash-street-bungalow/",
      width: 130,
      height: 130,
      colorDark: "#1a1714",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>

</body>
</html>
