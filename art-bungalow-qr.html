<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Washington Street Bungalow — Guest Guide QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --cream:   #f8f5f0;
      --warm:    #ede8df;
      --sand:    #c9b99a;
      --brown:   #7a6652;
      --accent:  #8b6f4e;
      --ink:     #1a1714;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      font-family: var(--font-body);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: white;
      border: 1px solid var(--warm);
      border-radius: 4px;
      padding: 3rem 3.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 40px rgba(122,102,82,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .eyebrow {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sand);
    }

    .property-name {
      font-family: var(--font-display);
      font-size: 2.6rem;
      font-weight: 300;
      color: var(--ink);
      line-height: 1.1;
    }

    .property-name em {
      font-style: italic;
      color: var(--accent);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--sand);
    }

    #qrcode {
      padding: 1rem;
      border: 1px solid var(--warm);
      border-radius: 4px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #qrcode canvas,
    #qrcode img {
      display: block;
    }

    .cta {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 300;
      font-style: italic;
      color: var(--brown);
      line-height: 1.5;
    }

    .url {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: var(--sand);
    }

    /* Print styles */
    @media print {
      body {
        background: white;
        padding: 0;
        min-height: unset;
      }
      .card {
        box-shadow: none;
        border: 1px solid #ddd;
        margin: 0 auto;
        page-break-inside: avoid;
      }
      .no-print { display: none; }
    }
  </style>
</head>
<body>

  <div>
    <div class="card">
      <span class="eyebrow">Welcome, guests</span>

      <h1 class="property-name">The Washington Street<br/><em>Bungalow</em></h1>

      <div class="divider"></div>

      <div id="qrcode"></div>

      <p class="cta">Scan for unit info, dining, nightlife,<br/>shopping &amp; local recommendations</p>

      <span class="url">joelswenddal.github.io/wash-street-bungalow</span>
    </div>

    <!-- Print button (hidden when printing) -->
    <div class="no-print" style="text-align:center; margin-top:1.5rem;">
      <button onclick="window.print()" style="
        font-family: 'DM Sans', sans-serif;
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        background: #8b6f4e;
        color: white;
        border: none;
        padding: 0.7rem 2rem;
        border-radius: 2px;
        cursor: pointer;
      ">Print / Save as PDF</button>
    </div>
  </div>

  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://joelswenddal.github.io/wash-street-bungalow/",
      width: 200,
      height: 200,
      colorDark: "#1a1714",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H  // highest error correction
    });
  </script>

</body>
</html>
